name: lizaplayer
description: Custom Yandex Music/SoundCloud player
publish_to: 'none'
version: 2.3.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  yandex_music: ^1.2.2
  just_audio: ^0.9.46
  just_audio_media_kit: ^1.0.0
  cached_network_image: ^3.4.1
  window_manager: ^0.4.2
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  http: ^1.2.0
  font_awesome_flutter: ^10.7.0
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_linux: ^1.2.1
  dbus: ^0.7.12
  audio_service: ^0.18.18

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.0
flutter:
  generate: true
  uses-material-design: true

